exp_name: 'card_second_cc_aug_baseline'
gpu_id: [0]
logger:
    display_id: 9908
model:
    enable_aux_mask: False
    transformer_encoder:
        input_dim: 2048
        feat_dim: 1024
        emb_dim: 512
        att_dim: 512
        att_head: 8
        att_layer: 2
        dim: 128
    transformer_decoder:
        input_dim: 2048
        word_dim: 300
        att_dim: 512
        att_head: 8
        att_layer: 2
        vocab_size: 956
        seq_length: 23
        share_wd_cls_weight: False
        label_smoothing: 0.0

data:
    dataset: 'second_cc'
    default_feature_dir: "./SECOND-CC-AUG/features"
    semantic_feature_dir: "./SECOND-CC-AUG/features"
    default_img_dir: "./SECOND-CC-AUG"
    semantic_img_dir: "./SECOND-CC-AUG"
    default_phase: "rgb/A"
    semantic_phase: "rgb/B"
    pseudo_mask_root: ""
    pseudo_mask_phase: ""
    allow_missing_pseudo_mask: False
    eval_anno_path: "./SECOND-CC-AUG/second_cc_aug_captions_reformat.json"
    splits_json: "./SECOND-CC-AUG/splits.json"
    vocab_json: "./SECOND-CC-AUG/transformer_second_cc_aug_vocab.json"
    h5_label_file: "./SECOND-CC-AUG/transformer_second_cc_aug_labels.h5"
    train:
        batch_size: 32
train:
    max_iter: 10000
    snapshot_interval: 1000
    grad_clip: -1.0
    lambda_mask: 0.0
    use_feature_reweight: False
    use_semantic_aux: False
    lambda_semantic: 0.0
    use_mask_conf_filter: False
    mask_conf_threshold: 0.5
    use_mask_warmup: False
    mask_warmup_steps: 0
    mask_loss_type: "bce"
    mask_bce_dice_alpha: 0.5
    optim:
        type: 'adam'
        lr: 0.0002
        weight_decay: 0.0
        step_size: 17
        gamma: 0.1